<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Configuración general de la página */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }

        /* Caja blanca que contiene la información */
        .contenedor {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
            border-top: 6px solid #004bab; /* Detalle azul */
        }

        /* Estilos de los textos */
        h1 {
            color: #004bab;
            font-size: 24px;
            margin-bottom: 5px;
        }

        h2 {
            color: #666;
            font-size: 16px;
            margin-top: 0;
            font-weight: normal;
        }

        p {
            color: #333;
            font-size: 18px;
            font-weight: bold;
            margin: 20px 0;
        }

        /* Control del tamaño de la imagen */
        img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>Alan Peña Ramírez</h1>
        <h2>3°A DS</h2>
        <p>Arriba la máquina</p>
        <img src="../img/Cruz Azul.jpg" alt="Cruz Azul">
    </div>

</body>
</html>
