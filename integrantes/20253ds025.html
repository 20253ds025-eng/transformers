<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20253ds025</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            width: 80%;
            max-width: 600px;
            animation: aparecer 1s ease;
        }

        .perfil {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 4px solid #ffd369;
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #ffd369;
        }

        h2 {
            font-size: 1.4rem;
            font-weight: normal;
            line-height: 1.6;
        }

        .btn {
            margin-top: 25px;
            display: inline-block;
            padding: 12px 25px;
            background: #ffd369;
            color: #222;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: white;
            transform: scale(1.05);
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="../img/vamo.jpg" alt="Foto de perfil" class="perfil">

        <h1>20253ds025</h1>

        <h2>
            Soy Angel Uriel Jacobo Uriostegui <br>
            Soy del grupo 3°A
        </h2>

        <a href="#" class="btn">Bienvenido</a>
    </div>

</body>
</html>
